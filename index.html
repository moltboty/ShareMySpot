<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ShareMySpot — شارك موقعي</title>
  <meta name="description" content="Share your location to WhatsApp with one tap">
  <meta name="theme-color" content="#25D366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css?v=20260501-v16">
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/i18n.js?v=20260501-v16"></script>
  <script src="js/storage.js?v=20260501-v16"></script>
  <script src="js/utils.js?v=20260501-v16"></script>
  <script src="js/share-utils.js?v=20260501-v16"></script>
  <script src="js/share.js?v=20260501-v16"></script>
  <script src="js/app.js?v=20260501-v16"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      if (params.get('reset') === '1') {
        Promise.all([
          'serviceWorker' in navigator ? navigator.serviceWorker.getRegistrations().then(function (regs) { return Promise.all(regs.map(function (r) { return r.unregister(); })); }) : Promise.resolve(),
          'caches' in window ? caches.keys().then(function (keys) { return Promise.all(keys.map(function (k) { return caches.delete(k); })); }) : Promise.resolve()
        ]).then(function () {
          params.delete('reset');
          location.replace(location.pathname + '?' + params.toString());
        });
        return;
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=20260501-v16').then(function (reg) {
          if (reg && reg.update) reg.update();
        });
      }
    })();
  </script>
</body>
</html>
